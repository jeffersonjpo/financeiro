<script>
const firebaseConfig={apiKey:"AIzaSyCKkicHckV4_FbpZLX6EdEs6E1U34D7tZg",authDomain:"appfinanceiro-b8753.firebaseapp.com",projectId:"appfinanceiro-b8753",storageBucket:"appfinanceiro-b8753.firebasestorage.app",messagingSenderId:"1046798771489",appId:"1:1046798771489:web:5d772b3213447d8d144a60",measurementId:"G-0VX3JYC862"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
// Persistence disabled - using real-time listeners for cross-device sync
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const SPEND_CATS=['Alimentação','Assinaturas','Casa','Dívidas','Educação','Empresarial','Lazer','Objetivos de vida','Pessoal','Saúde','Serviços','Taxas','Transporte','Vestuário','Viagem','Outros'];
function allSpendCats(){
  const custom=(S.bud||[]).filter(b=>b.type==='custom-cat').map(b=>b.name);
  return [...SPEND_CATS,...custom.filter(n=>!SPEND_CATS.includes(n))];
}

const INCOME_CATS=['Salário','Receitas Variáveis','Cashback','Investimento','Prêmio','Presente','Transferências','Outros'];
const ACC_TYPES=['Conta Corrente','Poupança','Investimento','Benefícios','Outros'];
const CC=['#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#84cc16','#6366f1','#e879f9','#fb923c'];
const ASSET_TYPES=['Ações','Fundos de Investimentos','Fundo de Investimento Imobiliário','Criptomoedas','Stock','Reit','BDR','ETF','ETF Internacional','Tesouro Direto','Renda Fixa (CDB/LCI/LCA)','Dólar','Outros'];
const ASSET_COLORS={'Ações':'#3b82f6','Fundos de Investimentos':'#8b5cf6','Fundo de Investimento Imobiliário':'#14b8a6','Criptomoedas':'#f97316','Stock':'#10b981','Reit':'#06b6d4','BDR':'#f59e0b','ETF':'#ec4899','ETF Internacional':'#6366f1','Tesouro Direto':'#84cc16','Renda Fixa (CDB/LCI/LCA)':'#a78bfa','Dólar':'#22d3ee','Outros':'#4b6080'};
const COLS=['accounts','cards','tx','fx','fi','cp','ben','fxconf','ficonf','bud','invAcc','invItem','invHist','pend'];
const NOW=new Date(),CY=NOW.getFullYear(),CM=NOW.getMonth()+1;
let userKey='';
let S={tab:'dashboard',selM:CM,selY:CY,histMode:'month',histFil:'all',catPeriod:'month',fixTab:'gas',editCard:null,editAcc:null,editFx:null,editFi:null,editBen:null,editBud:false,expCards:{},expBills:{},expInvAcc:{},accounts:[],cards:[],tx:[],fx:[],fi:[],cp:[],ben:[],fxconf:[],ficonf:[],bud:[],invAcc:[],invItem:[],invHist:[],invSelAcc:null,invSelItem:null,pend:[],editPend:null,resumoMode:'month'};
let unsubs=[];
/* ── STORAGE ── */
function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}

/* ── MONETARY MASK ── */
function maskMoney(input){
  let raw=input.value.replace(/\D/g,'');
  if(!raw)raw='0';
  const num=parseInt(raw,10)/100;
  input.value=num.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  input.dataset.cents=parseInt(raw,10);
}
function getMaskedValue(id){
  const el=document.getElementById(id);
  if(!el)return 0;
  if(el.dataset.cents!==undefined)return parseInt(el.dataset.cents||0)/100;
  return parseFloat((el.value||'0').replace(/\./g,'').replace(',','.'))||0;
}
function setMaskedInput(el,value){
  if(!el)return;
  const cents=Math.round((value||0)*100);
  el.dataset.cents=cents;
  el.value=(cents/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmt(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2}).format(+(v||0))}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtd(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y}
function gv(id){const e=document.getElementById(id);return e?e.value:''}
function inM(t,m,y){const[ty,tm]=t.date.split('-').map(Number);return tm===m&&ty===y}

function fxActive(f,m,y){const sm=f.startMonth||CM,sy=f.startYear||CY;return y>sy||(y===sy&&m>=sm)}
function fixedExp(m,y){const conf=(S.fxconf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);return(S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)&&!conf.includes(f.id)).reduce((s,f)=>s+f.amount,0)}
function fixedInc(m,y){const conf=(S.ficonf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);return(S.fi||[]).filter(f=>f.active&&fxActive(f,m,y)&&!conf.includes(f.id)).reduce((s,f)=>s+f.amount,0)}
function accBal(id){
  const acc=(S.accounts||[]).find(a=>a.id===id);
  let b=acc?+(acc.initialBalance||0):0;
  (S.tx||[]).forEach(t=>{
    if(t.type==='ganho'&&t.acc===id)b+=t.amount;
    else if(t.type==='gasto'&&t.pm==='debito'&&t.acc===id)b-=t.amount;
    else if(t.type==='transferencia'&&t.acc===id)b+=(t.dir==='in'?t.amount:-t.amount);
  });
  (S.cp||[]).forEach(p=>{if(p.paidFrom===id)b-=p.amount});
  return b
}
function cardUsed(name){return(S.tx||[]).filter(t=>t.pm==='credito'&&t.card===name&&!t.paid).reduce((s,t)=>s+t.amount,0)}
function pendingBills(){

function startListeners(){
  unsubs.forEach(u=>{try{u()}catch(e){}});
  unsubs=[];
  lsLoad();render();
  showSync();
  let loaded=0;
  const total=COLS.length;
  COLS.forEach(col=>{
    const ref=db.collection('users').doc(userKey).collection(col);
    const unsub=ref.onSnapshot(
      {includeMetadataChanges:false},
      snap=>{
        S[col]=snap.docs.map(d=>({...d.data(),_docId:d.id}));
        lsSave(col);
        loaded++;
        if(loaded>=total)hideSync();
        render();
      },
      err=>{
        console.error('Sync ['+col+']:',err.code,err.message);
        loaded++;if(loaded>=total)hideSync();
      }
    );
    unsubs.push(unsub);
  });
}

async function dbSave(col,item){
  // 1. Optimistic local update for instant UI feedback
  const data={...item}; delete data._docId;
  const existing=(S[col]||[]).findIndex(x=>x.id===item.id);
  const docId=item._docId||item.id||uid();
  if(existing>=0) S[col][existing]={...data,_docId:docId};
  else S[col]=[...(S[col]||[]),{...data,_docId:docId}];
  lsSave(col); render();
  // 2. Write to Firebase — onSnapshot will confirm and sync other devices
  try{
    await db.collection('users').doc(userKey).collection(col).doc(docId).set(data);
  }catch(e){
    console.error('dbSave failed ['+col+']:',e.message);
    toast('Erro ao salvar. Verifique a conexão.','err');
  }
}
async function dbDel(col,id){
  // Optimistic local delete
  S[col]=(S[col]||[]).filter(x=>x.id!==id); lsSave(col); render();
  // Delete from Firebase
  try{
    const snap=await db.collection('users').doc(userKey).collection(col)
      .where('id','==',id).get();
    if(snap.empty){
      // Try direct doc ID match
      const item=(S[col]||[]).find(x=>x._docId&&x.id===id);
      if(item&&item._docId){
        await db.collection('users').doc(userKey).collection(col).doc(item._docId).delete();
      }
    } else {
      const batch=db.batch();
      snap.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
  }catch(e){ console.error('dbDel failed:',e.message); }
}
async function dbDelGroup(col,gid){
  // Optimistic local delete
  S[col]=(S[col]||[]).filter(x=>x.gid!==gid); lsSave(col); render();
  // Delete from Firebase
  try{
    const snap=await db.collection('users').doc(userKey).collection(col)
      .where('gid','==',gid).get();
    if(!snap.empty){
      const batch=db.batch();
      snap.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
  }catch(e){ console.error('dbDelGroup failed:',e.message); }
}

function getAutoBillingMonth(cardName){
  const card=(S.cards||[]).find(c=>c.name===cardName);
  const today=new Date();
  const todayDay=today.getDate();
  const closeDay=card&&card.closeDay?card.closeDay:null;
  let bm=today.getMonth()+1;
  let by=today.getFullYear();
  if(closeDay&&todayDay>closeDay){
    // past closing day → next month's bill
    bm++;
    if(bm>12){bm=1;by++;}
  }
  return{bm,by};
}

  const prev=document.getElementById('n-parc-prev');

  if(!prev||!valEl)return;
  if(amt>0&&inst>1){valEl.textContent=fmt(amt/inst)+' × '+inst+'x';prev.classList.remove('hidden')}
  else prev.classList.add('hidden')
}
async function submitNew(){
  const amt=getMaskedValue('n-amt'),dsc=gv('n-dsc').trim();
  if(!dsc){toast('Informe uma descrição','err');return}
  if(isNaN(amt)||amt<=0){toast('Informe um valor válido','err');return}
  const date=gv('n-date')||new Date().toISOString().slice(0,10);
  const gid=uid();showSync();
  if(nType==='gasto'){
    const pm=gv('n-pm');if(!pm){toast('Selecione a forma de pagamento','err');hideSync();return}
    if(pm==='credito'){
      const card=gv('n-card');if(!card){toast('Selecione o cartão','err');hideSync();return}
      const n=Math.max(1,parseInt(gv('n-inst'))||1);
      let bm=parseInt(gv('n-bm')),by=parseInt(gv('n-by'));
      for(let i=0;i<n;i++){let m2=bm+i,y2=by;while(m2>12){m2-=12;y2++}await dbSave('tx',{id:uid(),date,type:'gasto',desc:n>1?dsc+' ('+(i+1)+'/'+n+')':dsc,cat:gv('n-cat')||'Outros',amount:+(amt/n).toFixed(2),pm:'credito',acc:'',card,bm:m2,by:y2,paid:false,at:new Date().toISOString(),gid,iNum:i+1,iTotal:n})}
    }else{
      await dbSave('tx',{id:uid(),date,type:'gasto',desc:dsc,cat:gv('n-cat')||'Outros',amount:amt,pm:'debito',acc:gv('n-acc-deb'),card:'',bm:0,by:0,paid:false,at:new Date().toISOString(),gid,iNum:1,iTotal:1})
    }
  }else if(nType==='ganho'){
    await dbSave('tx',{id:uid(),date,type:'ganho',desc:dsc,cat:gv('n-cat')||'Salário',amount:amt,pm:'',acc:gv('n-acc-gan'),card:'',bm:0,by:0,paid:false,at:new Date().toISOString(),gid,iNum:1,iTotal:1})
  }else{
    const orig=gv('n-orig'),dest=gv('n-dest');
    if(!orig||!dest){toast('Selecione as contas','err');hideSync();return}
    if(orig===dest){toast('Contas devem ser diferentes','err');hideSync();return}
    await dbSave('tx',{id:uid(),date,type:'transferencia',desc:dsc,cat:'Transferências',amount:amt,pm:'',acc:orig,card:'',bm:0,by:0,paid:false,dir:'out',at:new Date().toISOString(),gid,iNum:1,iTotal:1});
    await dbSave('tx',{id:uid(),date,type:'transferencia',desc:dsc,cat:'Transferências',amount:amt,pm:'',acc:dest,card:'',bm:0,by:0,paid:false,dir:'in',at:new Date().toISOString(),gid,iNum:1,iTotal:1})
  }
  toast('Lançamento registrado! ✓');closeNew()
}
</script>
<script>
/* ── WRAPPERS para evitar aspas dentro de template literals ── */
function newCard(){startCardEdit('new')}
function newAcc(){startAccEdit('new')}
function newFix(){startFEdit('new')}
function startFEdit(id){if(S.fixTab==='inc')S.editFi=id;else S.editFx=id;render();}
function newBen(){startBenEdit('new')}
function newPend(){S.editPend='new';render()}
function pendEdit(id){S.editPend=id;render();}
function pendDel(id,nome){delPend(id,nome);}
function editPend(id){S.editPend=id;render()}
function newInvMov(itemId,accId){openInvModal('movimentar',itemId,accId)}
function newInvItem(accId){openInvModal('new-item',accId)}
function invEditAcc(id){openInvModal('edit-acc',id)}
function invEditItem(id,accId){openInvModal('edit-item',id,accId)}
function invNewAcc(){openInvModal('new-acc')}
/* ═══════════════════════ RENDER ═══════════════════════ */
function render(){
  const app=document.getElementById('app');
  if(S.tab==='dashboard')app.innerHTML=renderDash();
  else if(S.tab==='cartoes')app.innerHTML=renderCartoes();
  else if(S.tab==='contas')app.innerHTML=renderContas();
  else if(S.tab==='fixos')app.innerHTML=renderFixos();
  else if(S.tab==='investimentos')app.innerHTML=renderInvestimentos();
  else if(S.tab==='orcamento')app.innerHTML=renderOrcamento();
  else if(S.tab==='beneficios')app.innerHTML=renderBen();
  else if(S.tab==='historico')app.innerHTML=renderHist();
  if(S.tab==='dashboard')setTimeout(setupCharts,40);
  if(S.tab==='investimentos')setTimeout(setupInvChart,40);
}
/* ── DASHBOARD ── */
function renderDash(){
  const m=S.selM,y=S.selY;
  const txInc=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,m,y)).reduce((s,t)=>s+t.amount,0);
  const fiInc=fixedInc(m,y);
  const income=txInc+fiInc;
  const debit=(S.tx||[]).filter(t=>t.type==='gasto'&&t.pm==='debito'&&inM(t,m,y)).reduce((s,t)=>s+t.amount,0);
  const fxExp=fixedExp(m,y);
  const credCard=(S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===m&&t.by===y).reduce((s,t)=>s+t.amount,0);
  const expenses=debit+fxExp+credCard;
  const balance=income-expenses;
  const pct=income>0?Math.min(100,Math.round(expenses/income*100)):0;
  const bc=cBar(pct);
  const pendMth=pendingBills().filter(b=>b.bm===m&&b.by===y);
  const accs=(S.accounts||[]).map(a=>({...a,bal:accBal(a.id)})).sort((a,b)=>b.bal-a.bal||a.name.localeCompare(b.name,'pt'));
  const totalBal=accs.reduce((s,a)=>s+a.bal,0);
  const cards=(S.cards||[]).map(c=>{const u=cardUsed(c.name),p=c.limit>0?Math.min(100,Math.round(u/c.limit*100)):0;return{...c,used:u,pct:p,cc:cBar(p),avail:Math.max(0,c.limit-u)}}).sort((a,b)=>b.avail-a.avail||a.name.localeCompare(b.name,'pt'));
  const catMap={};
  (S.tx||[]).filter(t=>t.type==='gasto'&&t.pm==='debito'&&inM(t,m,y)).forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amount});
  (S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===m&&t.by===y).forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amount});
  (S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)).forEach(f=>{catMap[f.cat]=(catMap[f.cat]||0)+f.amount});
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const confFx=(S.fxconf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);
  const activeFx=(S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)&&!confFx.includes(f.id));
  const confFi=(S.ficonf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);
  const activeFi=(S.fi||[]).filter(f=>f.active&&fxActive(f,m,y)&&!confFi.includes(f.id));
  let h=`<div class="hdr"><div class="hdr-row"><div><div style="font-size:11px;font-weight:700;color:#2d4060;letter-spacing:.12em;text-transform:uppercase">Controle</div><div class="hdr-title">Financeiro</div></div><div class="mnav"><button onclick="prevMonth()">&#8249;</button><span>${MONTHS[m-1]} ${y}</span><button onclick="nextMonth()">&#8250;</button></div></div></div><div class="pg">`;
  /* hero */
  h+=`<div class="hero"><div style="font-size:11px;font-weight:700;color:#2d4060;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">Saldo do Mês</div><div style="font-size:38px;font-weight:900;color:${balance>=0?'#10b981':'#ef4444'};letter-spacing:-.03em;margin-bottom:14px">${fmt(balance)}</div>`;
  h+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:11px;color:#2d4060;font-weight:600">Comprometimento da renda</span><span style="font-size:11px;font-weight:700;color:${bc}">${pct}%</span></div><div class="pbar"><div class="pfill" style="width:${pct}%;background:${bc}"></div></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.14);border-radius:12px;padding:10px 14px"><div style="font-size:10px;color:#10b981;font-weight:700;text-transform:uppercase;margin-bottom:4px">↑ Receitas</div><div style="font-size:17px;font-weight:800;color:#10b981">${fmt(income)}</div></div><div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.14);border-radius:12px;padding:10px 14px"><div style="font-size:10px;color:#ef4444;font-weight:700;text-transform:uppercase;margin-bottom:4px">↓ Gastos</div><div style="font-size:17px;font-weight:800;color:#ef4444">${fmt(expenses)}</div></div></div></div>`;
  /* contas */
  if(accs.length){
    h+=`<div class="card"><div class="sec">Contas Bancárias</div>`;
    accs.forEach(a=>{h+=`<div class="li"><div><div style="font-size:13px;font-weight:700;color:#dde4f0">${esc(a.name)}</div><div style="font-size:11px;color:#4b6080;margin-top:1px">${esc(a.type||'Conta Corrente')}</div></div><div style="font-size:15px;font-weight:800;color:${a.bal>=0?'#10b981':'#ef4444'}">${fmt(a.bal)}</div></div>`});
    h+=`<div style="display:flex;justify-content:space-between;padding-top:10px;margin-top:4px;border-top:1px solid rgba(255,255,255,.06)"><span style="font-size:12px;color:#4b6080;font-weight:700">Total em contas</span><span style="font-size:14px;font-weight:800;color:#dde4f0">${fmt(totalBal)}</span></div></div>`;
  }
  /* cartões */
  if(cards.length){
    h+=`<div class="card"><div class="sec">Cartões de Crédito</div>`;
    cards.forEach((c,i)=>{h+=`<div style="${i?'margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05)':''}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:13px;font-weight:700;color:#dde4f0">${esc(c.name)}</span><span style="font-size:11px;color:${c.cc};font-weight:700">${fmt(c.used)} / ${fmt(c.limit)}</span></div><div class="pbar"><div class="pfill" style="width:${c.pct}%;background:${c.cc}"></div></div><div style="font-size:11px;color:#4b6080;margin-top:4px">Disponível: <strong style="color:#7a94b4">${fmt(c.avail)}</strong></div></div>`});
    h+=`</div>`;
  }
  /* faturas pendentes */
  if(pendMth.length){
    h+=`<div class="alert-box"><div style="display:flex;align-items:center;gap:7px;margin-bottom:12px"><span>⚠️</span><span style="font-size:13px;font-weight:700;color:#f59e0b">Faturas de ${MONTHS[m-1]}</span></div>`;
    pendMth.forEach((b,i)=>{h+=`<div style="${i?'border-top:1px solid rgba(255,255,255,.05);padding-top:9px;margin-top:9px':''}"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700;color:#dde4f0">${esc(b.card)}</div><div style="font-size:11px;color:#2d4060">${b.items.length} lançamento${b.items.length!==1?'s':''}</div></div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:15px;font-weight:800;color:#f59e0b">${fmt(b.amount)}</span><button class="bsm ba" onclick="openPay('${esc(b.card)}',${b.bm},${b.by})">Pagar</button></div></div></div>`});
    h+=`</div>`;
  }
  /* bar chart */
  h+=`<div class="card"><div class="sec">Últimos 6 Meses</div><div style="position:relative;height:140px"><canvas id="bar-c"></canvas></div><div style="display:flex;justify-content:center;gap:20px;margin-top:8px"><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#2d4060"><div style="width:8px;height:8px;background:#10b981;border-radius:2px"></div>Receitas</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#2d4060"><div style="width:8px;height:8px;background:#ef4444;border-radius:2px"></div>Gastos</div></div></div>`;
  /* donut */
  if(cats.length){
    h+=`<div class="card"><div class="sec">Gastos por Categoria (mês)</div><div style="display:flex;gap:14px;align-items:center"><div style="flex-shrink:0"><canvas id="dnt-c" width="110" height="110"></canvas></div><div style="flex:1;min-width:0">`;
    cats.slice(0,5).forEach(([n,v],i)=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;background:${CC[i%CC.length]};border-radius:2px;flex-shrink:0"></div><span style="font-size:12px;color:#7a94b4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:88px">${esc(n)}</span></div><span style="font-size:12px;font-weight:700;color:#dde4f0;flex-shrink:0">${fmt(v)}</span></div>`});
    h+=`</div></div></div>`;
  }
  /* period cat chart */
  const cpData=buildCatData(S.catPeriod,m,y);
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="sec" style="margin-bottom:0">Gastos por Período</div><div style="display:flex;gap:5px">`;
  [['month','Mês'],['year','Ano'],['all','Tudo']].forEach(([v,l])=>{h+=`<button class="pill${S.catPeriod===v?' on':''}" onclick="S.catPeriod='${v}';render()">${l}</button>`});
  h+=`</div></div>`;
  if(cpData.length){h+=`<div style="position:relative;height:${Math.max(150,cpData.length*28)}px"><canvas id="cat-c"></canvas></div>`}
  else{h+=`<div style="text-align:center;color:#2d4060;font-size:13px;padding:20px">Nenhum dado no período</div>`}
  h+=`</div>`;
  /* ganhos fixos */
  if(activeFi.length){
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="sec" style="margin-bottom:0">Ganhos Fixos do Mês</div><span style="font-size:14px;font-weight:800;color:#10b981">+${fmt(fiInc)}</span></div>`;
    activeFi.forEach((f,i)=>{h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;${i?'border-top:1px solid rgba(255,255,255,.04)':''}"><span style="font-size:13px;color:#7a94b4">${esc(f.desc)}</span><span style="font-size:13px;font-weight:600;color:#10b981">${fmt(f.amount)}</span></div>`});
    h+=`</div>`;
  }
  /* gastos fixos */
  if(activeFx.length){
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="sec" style="margin-bottom:0">Gastos Fixos do Mês</div><span style="font-size:14px;font-weight:800;color:#dde4f0">${fmt(fxExp)}</span></div>`;
    activeFx.forEach((f,i)=>{h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;${i?'border-top:1px solid rgba(255,255,255,.04)':''}"><span style="font-size:13px;color:#7a94b4">${esc(f.desc)}</span><span style="font-size:13px;font-weight:600;color:#dde4f0">${fmt(f.amount)}</span></div>`});
    h+=`</div>`;
  }
  
  // ── RESUMO CARD ──
  const resumoMode=S.resumoMode||'month';
  h+=`<div class="card">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">`;
  h+=`<div class="sec" style="margin-bottom:0">Resumo</div>`;
  h+=`<div style="display:flex;gap:5px">`;
  h+=`<button class="pill${resumoMode==='month'?' on':''}" onclick="S.resumoMode='month';render()">Mês</button>`;
  h+=`<button class="pill${resumoMode==='year'?' on':''}" onclick="S.resumoMode='year';render()">Ano Completo</button>`;
  h+=`</div></div>`;

  if(resumoMode==='month'){
    // ── MONTH VIEW ──
    const resumoCards=(S.cards||[]).map(cd=>{
      const fat=(S.tx||[]).filter(t=>t.pm==='credito'&&t.card===cd.name&&t.bm===m&&t.by===y).reduce((s,t)=>s+t.amount,0);
      return{name:cd.name,fat};
    }).filter(cd=>cd.fat>0).sort((a,b)=>b.fat-a.fat);
    const confFxM=(S.fxconf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);
    const resumoFx=(S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)&&!confFxM.includes(f.id));
    const resumoGanhos=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,m,y));
    const confFiM=(S.ficonf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);
    const resumoFiAtivos=(S.fi||[]).filter(f=>f.active&&fxActive(f,m,y)&&!confFiM.includes(f.id));
    const totalCards=resumoCards.reduce((s,cd)=>s+cd.fat,0);
    const totalFx=resumoFx.reduce((s,f)=>s+f.amount,0);
    const totalGastos=totalCards+totalFx;
    const totalGanhosTx=resumoGanhos.reduce((s,t)=>s+t.amount,0);
    const totalFiAtivos=resumoFiAtivos.reduce((s,f)=>s+f.amount,0);
    const totalProventos=totalGanhosTx+totalFiAtivos;
    const saldo=totalProventos-totalGastos;

    // Gastos section
    if(resumoCards.length||resumoFx.length){
      h+=`<div style="font-size:10px;font-weight:800;color:#ef4444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Gastos</div>`;
      if(resumoCards.length){
        h+=`<div style="font-size:10px;color:#4b6080;font-weight:700;text-transform:uppercase;margin-bottom:5px;margin-left:4px">Cartões</div>`;
        resumoCards.forEach((cd,i)=>{
          h+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;background:${i%2===0?'rgba(255,255,255,.02)':'transparent'};border-radius:6px">`;
          h+=`<span style="font-size:13px;color:#7a94b4">${esc(cd.name)}</span>`;
          h+=`<span style="font-size:13px;font-weight:600;color:#dde4f0">${fmt(cd.fat)}</span></div>`;
        });
      }
      if(resumoFx.length){
        h+=`<div style="font-size:10px;color:#4b6080;font-weight:700;text-transform:uppercase;margin-bottom:5px;margin-top:8px;margin-left:4px">Fixos</div>`;
        resumoFx.forEach((f,i)=>{
          h+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;background:${i%2===0?'rgba(255,255,255,.02)':'transparent'};border-radius:6px">`;
          h+=`<span style="font-size:13px;color:#7a94b4">${esc(f.desc)}</span>`;
          h+=`<span style="font-size:13px;font-weight:600;color:#dde4f0">${fmt(f.amount)}</span></div>`;
        });
      }
      h+=`<div style="display:flex;justify-content:space-between;padding:8px;background:rgba(239,68,68,.06);border-radius:8px;margin-top:8px;border:1px solid rgba(239,68,68,.12)">`;
      h+=`<span style="font-size:13px;font-weight:800;color:#dde4f0">Total de Gastos do Mês</span>`;
      h+=`<span style="font-size:13px;font-weight:900;color:#ef4444">${fmt(totalGastos)}</span></div>`;
    }

    // Ganhos section
    h+=`<div style="height:14px"></div>`;
    if(resumoGanhos.length||resumoFiAtivos.length){
      h+=`<div style="font-size:10px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Proventos</div>`;
      resumoGanhos.forEach((t,i)=>{
        h+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;background:${i%2===0?'rgba(255,255,255,.02)':'transparent'};border-radius:6px">`;
        h+=`<span style="font-size:13px;color:#7a94b4">${esc(t.desc)}</span>`;
        h+=`<span style="font-size:13px;font-weight:600;color:#dde4f0">${fmt(t.amount)}</span></div>`;
      });
      resumoFiAtivos.forEach((f,i)=>{
        const ii=resumoGanhos.length+i;
        h+=`<div style="display:flex;justify-content:space-between;padding:6px 8px;background:${ii%2===0?'rgba(255,255,255,.02)':'transparent'};border-radius:6px">`;
        h+=`<span style="font-size:13px;color:#7a94b4">${esc(f.desc)} <span style="font-size:10px;color:#2d4060">(fixo)</span></span>`;
        h+=`<span style="font-size:13px;font-weight:600;color:#dde4f0">${fmt(f.amount)}</span></div>`;
      });
      h+=`<div style="display:flex;justify-content:space-between;padding:8px;background:rgba(16,185,129,.06);border-radius:8px;margin-top:8px;border:1px solid rgba(16,185,129,.12)">`;
      h+=`<span style="font-size:13px;font-weight:800;color:#dde4f0">Total de Proventos do Mês</span>`;
      h+=`<span style="font-size:13px;font-weight:900;color:#10b981">${fmt(totalProventos)}</span></div>`;
    }

    // Saldo
    h+=`<div style="display:flex;justify-content:space-between;padding:10px 12px;background:${saldo>=0?'rgba(16,185,129,.08)':'rgba(239,68,68,.08)'};border-radius:10px;margin-top:10px;border:1px solid ${saldo>=0?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'}">`;
    h+=`<span style="font-size:15px;font-weight:900;color:#dde4f0">Saldo</span>`;
    h+=`<span style="font-size:15px;font-weight:900;color:${saldo>=0?'#10b981':'#ef4444'}">${saldo>=0?'+':''}${fmt(saldo)}</span></div>`;

  } else {
    // ── YEAR VIEW — scrollable table ──
    const months=MONTHS.map((mn,mi)=>({mn:mn.slice(0,3),m:mi+1}));
    // Collect all card names with any billing in year
    const yearCards=[...new Set((S.tx||[]).filter(t=>t.pm==='credito'&&t.by===y).map(t=>t.card))].sort();
    // Collect all active fixed expenses
    const yearFx=[...new Set((S.fx||[]).filter(f=>f.active).map(f=>f.id))].map(id=>(S.fx||[]).find(f=>f.id===id)).filter(Boolean);

    }

      h+=`<tr><td colspan="${months.length+2}" style="padding:8px 8px 4px;font-size:10px;font-weight:800;color:#f97316;text-transform:uppercase;letter-spacing:.1em">Fixos</td></tr>`;

        h+=`<td style="padding:5px 8px;color:#7a94b4;position:sticky;left:0;background:${fi%2===0?'#0f1e35':'#0d1a30'}">${esc(fx.desc)}</td>`;

      });
    }

    // ── TOTAL GASTOS row ──
    h+=`<tr style="border-top:2px solid rgba(239,68,68,.2)">`;
    h+=`<td style="padding:7px 8px;font-weight:800;color:#ef4444;position:sticky;left:0;background:#0d1e35">Gastos do Mês</td>`;
    let totalGastosAno=0;
    months.forEach(({m:mi})=>{
      const cards2=(S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===mi&&t.by===y).reduce((s,t)=>s+t.amount,0);
      const confFx2=(S.fxconf||[]).filter(x=>x.month===mi&&x.year===y).map(x=>x.fixId);
      const fx2=(S.fx||[]).filter(f=>f.active&&fxActive(f,mi,y)&&!confFx2.includes(f.id)).reduce((s,f)=>s+f.amount,0);
      const tot=cards2+fx2;totalGastosAno+=tot;
      h+=`<td style="text-align:right;padding:7px 6px;font-weight:700;color:#ef4444">${tot>0?fmt(tot):'—'}</td>`;
    });
    h+=`<td style="text-align:right;padding:7px 8px;font-weight:900;color:#ef4444">${fmt(totalGastosAno)}</td></tr>`;

    // ── GANHOS section ──
    if(yearGanhoDescs.length){
      h+=`<tr><td colspan="${months.length+2}" style="padding:8px 8px 4px;font-size:10px;font-weight:800;color:#10b981;text-transform:uppercase;letter-spacing:.1em">Ganhos</td></tr>`;
      yearGanhoDescs.forEach((desc,di)=>{
        let total=0;
        h+=`<tr style="background:${di%2===0?'rgba(255,255,255,.02)':'transparent'}">`;
        h+=`<td style="padding:5px 8px;color:#7a94b4;position:sticky;left:0;background:${di%2===0?'#0f1e35':'#0d1a30'}">${esc(desc)}</td>`;
        months.forEach(({m:mi})=>{
          const val=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,mi,y)&&t.desc===desc).reduce((s,t)=>s+t.amount,0);
          total+=val;
          h+=`<td style="text-align:right;padding:5px 6px;color:${val>0?'#dde4f0':'#2d4060'}">${val>0?fmt(val):'—'}</td>`;
        });
        h+=`<td style="text-align:right;padding:5px 8px;font-weight:700;color:${total>0?'#10b981':'#2d4060'}">${total>0?fmt(total):'—'}</td></tr>`;
      });
    }

    // ── TOTAL PROVENTOS row ──
    h+=`<tr style="border-top:2px solid rgba(16,185,129,.2)">`;
    h+=`<td style="padding:7px 8px;font-weight:800;color:#10b981;position:sticky;left:0;background:#0d1e35">Proventos do Mês</td>`;

      const txG=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,mi,y)).reduce((s,t)=>s+t.amount,0);

      const fi2=fixedInc(mi,y);
      const tot=txG+fi2;totalProventosAno+=tot;
      h+=`<td style="text-align:right;padding:7px 6px;font-weight:700;color:#10b981">${tot>0?fmt(tot):'—'}</td>`;
    });
    h+=`<td style="text-align:right;padding:7px 8px;font-weight:900;color:#10b981">${fmt(totalProventosAno)}</td></tr>`;

    // ── SALDO row ──
    h+=`<tr style="border-top:2px solid rgba(255,255,255,.1)">`;
    h+=`<td style="padding:7px 8px;font-weight:900;color:#dde4f0;position:sticky;left:0;background:#0d1e35">Saldo</td>`;
    let saldoAno=0;
    months.forEach(({m:mi})=>{
      const txG=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,mi,y)).reduce((s,t)=>s+t.amount,0);
      const fi2=fixedInc(mi,y);
      const cards2=(S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===mi&&t.by===y).reduce((s,t)=>s+t.amount,0);
      const confFx2=(S.fxconf||[]).filter(x=>x.month===mi&&x.year===y).map(x=>x.fixId);
      const fx2=(S.fx||[]).filter(f=>f.active&&fxActive(f,mi,y)&&!confFx2.includes(f.id)).reduce((s,f)=>s+f.amount,0);
      const sal=(txG+fi2)-(cards2+fx2);
      saldoAno+=sal;
      const clr=sal>=0?'#10b981':'#ef4444';
      h+=`<td style="text-align:right;padding:7px 6px;font-weight:800;color:${clr}">${fmt(sal)}</td>`;
    });
    const saldoAnoCor=saldoAno>=0?'#10b981':'#ef4444';
    h+=`<td style="text-align:right;padding:7px 8px;font-weight:900;color:${saldoAnoCor}">${fmt(saldoAno)}</td></tr>`;

    h+=`</tbody></table></div>`;
  }
  h+=`</div>`;

  h+=`</div>`;return h
}

let barC=null,dntC=null,catC=null;
function buildCatData(period,m,y){
  const map={};
  let txL=S.tx||[];
  if(period==='month'){
    (txL.filter(t=>t.type==='gasto'&&t.pm==='debito'&&inM(t,m,y))).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    (txL.filter(t=>t.pm==='credito'&&t.bm===m&&t.by===y)).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    (S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)).forEach(f=>{map[f.cat]=(map[f.cat]||0)+f.amount});
  }else if(period==='year'){
    (txL.filter(t=>t.type==='gasto'&&t.pm==='debito'&&t.date.startsWith(String(y)))).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    (txL.filter(t=>t.pm==='credito'&&t.by===y)).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    for(let mi=1;mi<=12;mi++){(S.fx||[]).filter(f=>f.active&&fxActive(f,mi,y)).forEach(f=>{map[f.cat]=(map[f.cat]||0)+f.amount})}
  }else{
    txL.filter(t=>t.type==='gasto'&&t.pm==='debito').forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    txL.filter(t=>t.pm==='credito').forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount});
    const yrs=[...new Set(txL.map(t=>+t.date.slice(0,4)))];
    yrs.forEach(yr=>{for(let mi=1;mi<=12;mi++){(S.fx||[]).filter(f=>f.active&&fxActive(f,mi,yr)).forEach(f=>{map[f.cat]=(map[f.cat]||0)+f.amount})}});
  }
  return Object.entries(map).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1])
}
function setupCharts(){
  const m=S.selM,y=S.selY;
  const barData=[];
  for(let i=5;i>=0;i--){
    let bm=m-i,by=y;if(bm<=0){bm+=12;by--}
    const inc=(S.tx||[]).filter(t=>t.type==='ganho'&&inM(t,bm,by)).reduce((s,t)=>s+t.amount,0)+fixedInc(bm,by);
    const deb=(S.tx||[]).filter(t=>t.type==='gasto'&&t.pm==='debito'&&inM(t,bm,by)).reduce((s,t)=>s+t.amount,0);
    const fx=fixedExp(bm,by);
    const crd=(S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===bm&&t.by===by).reduce((s,t)=>s+t.amount,0);
    barData.push({mn:MONTHS[bm-1].slice(0,3),rec:inc,gas:deb+fx+crd})
  }
  const be=document.getElementById('bar-c');
  if(be){if(barC)barC.destroy();barC=new Chart(be,{type:'bar',data:{labels:barData.map(d=>d.mn),datasets:[{label:'Receitas',data:barData.map(d=>d.rec),backgroundColor:'rgba(16,185,129,.7)',borderRadius:4,borderSkipped:false},{label:'Gastos',data:barData.map(d=>d.gas),backgroundColor:'rgba(239,68,68,.7)',borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,30,53,.95)',titleColor:'#dde4f0',bodyColor:'#7a94b4',borderColor:'rgba(255,255,255,.08)',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{grid:{display:false},ticks:{color:'#2d3e55',font:{family:'Outfit',size:10}}},y:{display:false,grid:{display:false}}},barPercentage:.8,categoryPercentage:.6}})}
  const catMap={};
  (S.tx||[]).filter(t=>t.type==='gasto'&&t.pm==='debito'&&inM(t,m,y)).forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amount});
  (S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===m&&t.by===y).forEach(t=>{catMap[t.cat]=(catMap[t.cat]||0)+t.amount});
  (S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)).forEach(f=>{catMap[f.cat]=(catMap[f.cat]||0)+f.amount});
  const dCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const de=document.getElementById('dnt-c');
  if(de&&dCats.length){if(dntC)dntC.destroy();dntC=new Chart(de,{type:'doughnut',data:{labels:dCats.map(([n])=>n),datasets:[{data:dCats.map(([,v])=>v),backgroundColor:CC.slice(0,dCats.length),borderWidth:0,hoverOffset:4}]},options:{responsive:false,cutout:'52%',plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,30,53,.95)',titleColor:'#dde4f0',bodyColor:'#7a94b4',borderColor:'rgba(255,255,255,.08)',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw)}}}}})}
  const cpData=buildCatData(S.catPeriod,m,y);
  const ce=document.getElementById('cat-c');
  if(ce&&cpData.length){if(catC)catC.destroy();catC=new Chart(ce,{type:'bar',data:{labels:cpData.map(([n])=>n.length>15?n.slice(0,14)+'…':n),datasets:[{data:cpData.map(([,v])=>v),backgroundColor:cpData.map((_,i)=>CC[i%CC.length]),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,30,53,.95)',titleColor:'#dde4f0',bodyColor:'#7a94b4',borderColor:'rgba(255,255,255,.08)',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#2d3e55',font:{family:'Outfit',size:9},callback:v=>'R$'+Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0})}},y:{grid:{display:false},ticks:{color:'#7a94b4',font:{family:'Outfit',size:10}}}}}})}
}

  const sortedCards=(S.cards||[]).map(c=>{const u=cardUsed(c.name);return{...c,avail:Math.max(0,c.limit-u)}}).sort((a,b)=>b.avail-a.avail||a.name.localeCompare(b.name,'pt'));

    if(exp){

        h+=`</div>`
      });
      if(paid.length){
        h+=`<div class="sec" style="margin-top:4px">Histórico de Pagamentos</div>`;
        paid.forEach(p=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><div><span style="color:#7a94b4">${MONTHS[p.billingMonth-1]} ${p.billingYear}</span><span style="color:#2d4060"> · Pago ${MONTHS[p.paidMonth-1]} ${p.paidYear}</span>${p.paidFrom&&p.paidFrom!=='external'?`<span style="color:#2d4060"> · ${esc(accName(p.paidFrom))}</span>`:'<span style="color:#2d4060"> · Externo</span>'}</div><div style="display:flex;align-items:center;gap:6px"><span style="font-weight:700;color:#10b981">${fmt(p.amount)}</span><span style="color:#10b981">✓</span></div></div>`})
      }

    h+=`</div>`

  h+=`</div>`;return h
}

function renderContas(){

  const totGas=(S.fx||[]).filter(f=>f.active).reduce((s,f)=>s+f.amount,0);
  const totInc=(S.fi||[]).filter(f=>f.active).reduce((s,f)=>s+f.amount,0);

  let h='<div class="hdr"><div class="hdr-row"><div><div class="hdr-title">Lançamentos Fixos</div><div class="hdr-sub">'+sub+'</div></div>';
  if(isGas&&S.editFx===null)h+='<button class="bsm ba" onclick="newFix()">+ Novo</button>';
  if(isInc&&S.editFi===null)h+='<button class="bsm ba" onclick="newFix()">+ Novo</button>';
  if(isPend&&S.editPend===null)h+='<button class="bsm ba" onclick="newPend()">+ Novo</button>';

  h+='<button class="pill'+(isInc?' on':'')+'" onclick="S.fixTab=\'inc\';S.editFx=null;S.editFi=null;S.editPend=null;render()">💰 Ganhos</button>';
  h+='<button class="pill'+(isPend?' on':'')+'" onclick="S.fixTab=\'pend\';S.editFx=null;S.editFi=null;S.editPend=null;render()">📌 Pendentes</button>';
  h+='</div>';

    if(S.editFx!==null)h+=renderFxForm();
    const list=S.fx||[];
    if(!list.length&&S.editFx===null)h+='<div class="card" style="text-align:center;padding:48px 16px"><div style="font-size:42px;margin-bottom:12px">📋</div><div style="color:#7a94b4;font-weight:600">Nenhum gasto fixo cadastrado</div></div>';
    list.forEach(function(f){h+=renderFixItem(f,'gas');});
  }
  if(isInc){
    if(S.editFi!==null)h+=renderFiForm();
    const list=S.fi||[];
    if(!list.length&&S.editFi===null)h+='<div class="card" style="text-align:center;padding:48px 16px"><div style="font-size:42px;margin-bottom:12px">💰</div><div style="color:#7a94b4;font-weight:600">Nenhum ganho fixo cadastrado</div><div style="color:#2d4060;font-size:12px;margin-top:4px">Ex: Salário fixo, aluguel recebido...</div></div>';
    list.forEach(function(f){h+=renderFixItem(f,'inc');});
  }
  if(isPend){
    if(S.editPend!==null)h+=renderPendForm();
    else h+='<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="bsm ba" onclick="newPend()">+ Novo</button></div>';
    const list=S.pend||[];
    if(!list.length&&S.editPend===null){
      h+='<div class="card" style="text-align:center;padding:48px 16px">';
      h+='<div style="font-size:42px;margin-bottom:12px">📌</div>';
      h+='<div style="color:#7a94b4;font-weight:600;font-size:15px">Nenhum pendente cadastrado</div>';
      h+='<div style="color:#2d4060;font-size:12px;margin-top:8px;line-height:1.6">Registre gastos ou ganhos futuros que podem ou não se concretizar.<br>Não afeta saldos nem cálculos financeiros.</div>';
      h+='</div>';
    }
    list.forEach(function(p){
      const tc=p.tipo==='gasto'?'#ef4444':'#10b981';
      const tl=p.tipo==='gasto'?'Gasto':'Ganho';
      h+='<div class="card" style="margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
      h+='<span style="font-size:14px;font-weight:700;color:#dde4f0">'+esc(p.nome)+'</span>';
      h+='<span class="badge" style="background:'+tc+'18;color:'+tc+';border:1px solid '+tc+'30">'+tl+'</span>';
      h+='</div>';
      h+='<div style="font-size:13px;font-weight:600;color:#7a94b4">'+fmt(p.valor);
      if(p.parcelas>1)h+=' <span style="font-size:11px;color:#4b6080">· '+p.parcelas+'x de '+fmt(p.valor/p.parcelas)+'</span>';
      h+='</div>';

      h+='</div>';
      h+='<div style="display:flex;gap:6px;flex-shrink:0;margin-left:12px">';

      h+='</div></div></div>';
    });
  }
  h+='</div>';return h;
}

function updatePendParc(){
  const v=getMaskedValue('pend-v'),p=parseInt(document.getElementById('pend-p')?.value||1);

  else if(el)el.textContent='';
}
async function savePend(){
  const nome=gv('pend-n').trim(),valor=getMaskedValue('pend-v'),parcelas=parseInt(gv('pend-p'))||1,tipo=gv('pend-t');
  if(!nome){toast('Informe o nome','err');return}
  if(!valor||valor<=0){toast('Informe um valor','err');return}
  const ex=S.editPend!=='new'?(S.pend||[]).find(x=>x.id===S.editPend):null;
  const item={id:ex?ex.id:uid(),nome,valor,parcelas,tipo,at:new Date().toISOString()};
  if(ex&&ex._docId)item._docId=ex._docId;
  await dbSave('pend',item);S.editPend=null;toast('Pendente salvo!');
}

function exportHist(period,format,m,y){

    doc.setFont('helvetica');doc.setFontSize(13);doc.setTextColor(30,30,30);

    doc.setFontSize(8);

    let yp=22,x=14;
    doc.setFillColor(8,16,30);doc.rect(x,yp-4,277,7,'F');doc.setTextColor(221,228,240);
    cols.forEach(function(col,i){doc.text(col,x,yp);x+=cw[i];});yp+=6;

      doc.setFillColor(ri%2===0?245:255,ri%2===0?246:255,ri%2===0?250:255);doc.setTextColor(30,30,30);
      x=14;
      [row['Data'],row['Tipo'],String(row['Descrição']||'').slice(0,35),row['Categoria'],row['Forma'],'R$ '+Number(row['Valor']).toLocaleString('pt-BR',{minimumFractionDigits:2}),row['Status']].forEach(function(v,i){doc.text(String(v||''),x,yp);x+=cw[i];});
      yp+=5;
    });
    doc.save('Financeiro_'+label+'.pdf');
  }
}

function getMonthSpendByCat(m,y){

  (S.tx||[]).filter(t=>t.pm==='credito'&&t.bm===m&&t.by===y).forEach(t=>{map[t.cat]=(map[t.cat]||0)+t.amount;});
  const confFx=(S.fxconf||[]).filter(x=>x.month===m&&x.year===y).map(x=>x.fixId);
  (S.fx||[]).filter(f=>f.active&&fxActive(f,m,y)&&!confFx.includes(f.id)).forEach(f=>{map[f.cat]=(map[f.cat]||0)+f.amount;});
  return map;
}

const catDebounce={};

  const val=parseFloat(rawVal)||0;
  clearTimeout(catDebounce[catName]);
  catDebounce[catName]=setTimeout(async function(){

async function addCustomBudCat(){

  if(SPEND_CATS.includes(trimmed)){toast('Categoria já existe','err');return;}
  if((S.bud||[]).some(b=>b.type==='custom-cat'&&b.name===trimmed)){toast('Categoria já cadastrada','err');return;}

async function delCustomBudCat(name){
  confirm_('Remover categoria "'+name+'"?','O teto salvo também será removido.',async function(){

      await dbSave('tx',{id:uid(),date,type:'transferencia',desc,cat:'Transferências',amount:amt,pm:'',acc:fromAccId,card:'',bm:0,by:0,paid:false,dir:'out',at:new Date().toISOString(),gid,iNum:1,iTotal:1});
    }else{
      await dbSave('tx',{id:uid(),date,type:'transferencia',desc,cat:'Transferências',amount:amt,pm:'',acc:fromAccId,card:'',bm:0,by:0,paid:false,dir:'in',at:new Date().toISOString(),gid,iNum:1,iTotal:1});
    }
    toast((tp==='aporte'?'Aporte':'Retirada')+' registrado! '+fmt(amt));
  }else{toast((tp==='valorizacao'?'Valorização':'Desvalorização')+' registrada! '+fmt(amt));}
  closePay();
}
async function askDelInvAcc(id,name){
  confirm_('Excluir a conta "'+name+'"?','Todos os investimentos serão removidos.',async function(){
    const items=(S.invItem||[]).filter(i=>i.accId===id);
    for(const it of items){const hists=(S.invHist||[]).filter(h=>h.itemId===it.id);for(const hh of hists)await dbDel('invHist',hh.id);await dbDel('invItem',it.id);}
    await dbDel('invAcc',id);toast('Conta removida!');
  });
}
async function askDelInvItem(id,name){
  confirm_('Excluir "'+name+'"?','O histórico será removido.',async function(){
    const hists=(S.invHist||[]).filter(h=>h.itemId===id);
    for(const hh of hists)await dbDel('invHist',hh.id);
    await dbDel('invItem',id);toast('Removido!');
  });
}
let invChart=null,invDonut=null;
function setupInvChart(){
  const dEl=document.getElementById('inv-donut');
  if(dEl){
    const typeMap={};
    (S.invItem||[]).forEach(function(item){const bal=invItemBal(item.id);if(bal<=0)return;const t=item.assetType||'Outros';typeMap[t]=(typeMap[t]||0)+bal;});
    const entries=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]);
    if(entries.length){
      if(invDonut)invDonut.destroy();
      invDonut=new Chart(dEl,{type:'doughnut',data:{labels:entries.map(function(e){return e[0];}),datasets:[{data:entries.map(function(e){return e[1];}),backgroundColor:entries.map(function(e){return ASSET_COLORS[e[0]]||'#4b6080';}),borderWidth:0,hoverOffset:4}]},options:{responsive:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,30,53,.95)',titleColor:'#dde4f0',bodyColor:'#7a94b4',borderColor:'rgba(255,255,255,.08)',borderWidth:1}}}});
    }
  }
  const el=document.getElementById('inv-chart');if(!el)return;
  const allHist=(S.invHist||[]).sort((a,b)=>a.date.localeCompare(b.date));
  if(allHist.length<2)return;
  const dates=[...new Set(allHist.map(h=>h.date))].sort();
  const dataPoints=dates.map(function(date){
    const upTo=allHist.filter(h=>h.date<=date);
    return upTo.reduce(function(s,h){if(h.type==='aporte'||h.type==='valorizacao'||h.type==='ajuste')return s+h.amount;return s-h.amount;},0);
  });
  if(invChart)invChart.destroy();
  invChart=new Chart(el,{type:'line',data:{labels:dates.map(d=>fmtd(d)),datasets:[{label:'Patrimônio',data:dataPoints,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#10b981',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,30,53,.95)',titleColor:'#dde4f0',bodyColor:'#7a94b4',borderColor:'rgba(255,255,255,.08)',borderWidth:1,callbacks:{label:function(ctx){return ' '+fmt(ctx.raw);}}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#2d3e55',font:{family:'Outfit',size:9},maxTicksLimit:8}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#2d3e55',font:{family:'Outfit',size:9},callback:function(v){return 'R$'+Number(v).toLocaleString('pt-BR',{maximumFractionDigits:0});}}}}}}); 
}
/* ── BACKUP & RESTORE ── */
function exportBackup(){
  const backup={
    version:2,
    exportedAt:new Date().toISOString(),
    email:auth.currentUser?.email||'',
    data:{}
  };
  COLS.forEach(col=>{backup.data[col]=S[col]||[]});
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`financeiro_backup_${date}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup exportado! ✓');
}
function importBackup(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const text=await file.text();
      const backup=JSON.parse(text);
      if(!backup.data){toast('Arquivo inválido','err');return}
      confirm_('Restaurar backup?','Todos os dados atuais serão substituídos pelos do backup.',async()=>{
        showSync();
        for(const col of COLS){
          if(!backup.data[col])continue;
          // Delete all current docs in this collection
          try{
            const snap=await db.collection('users').doc(userKey).collection(col).get();
            const batch=db.batch();snap.forEach(d=>batch.delete(d.ref));await batch.commit();
          }catch(e){}
          // Re-upload backup data
          for(const item of backup.data[col]){
            const data={...item};delete data._docId;
            const docId=item.id||uid();
            try{await db.collection('users').doc(userKey).collection(col).doc(docId).set(data);}catch(e){}
          }
        }
        hideSync();toast('Backup restaurado com sucesso! ✓');
      });
    }catch(e){toast('Erro ao ler arquivo: '+e.message,'err')}
  };
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}
</script>
